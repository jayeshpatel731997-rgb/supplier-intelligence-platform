# Phase 1 Render Blueprint: prove the API and Postgres deployment first.
# After this is healthy, promote render.full.yaml to render.yaml for Streamlit,
# Redis, Celery, and cron services.
services:
  - type: web
    name: supplier-intelligence-api
    runtime: docker
    plan: free
    region: oregon
    autoDeploy: true
    dockerfilePath: ./backend/Dockerfile
    dockerContext: .
    dockerCommand: /bin/sh -c "python scripts/migrate.py --create-all-fallback && uvicorn backend.main:app --host 0.0.0.0 --port ${PORT:-8000}"
    healthCheckPath: /health
    envVars:
      - fromGroup: supplier-intelligence-staging
      - key: SUPPLIER_DATABASE_URL
        fromDatabase:
          name: supplier-intelligence-postgres
          property: connectionString
      - key: DATABASE_URL
        fromDatabase:
          name: supplier-intelligence-postgres
          property: connectionString

databases:
  - name: supplier-intelligence-postgres
    databaseName: supplier_intelligence
    user: supplier_app
    plan: free
    region: oregon
    postgresMajorVersion: "16"
    ipAllowList: []

envVarGroups:
  - name: supplier-intelligence-staging
    envVars:
      - key: SUPPLIER_SECURITY_MODE
        value: local
      - key: SUPPLIER_DEPLOYMENT_MODE
        value: render-staging-phase1
      - key: SUPPLIER_DEMO_MODE
        value: "true"
      - key: AUTH_PROVIDER
        value: local
      - key: AUTH_ALLOW_LOCAL_IN_PRODUCTION
        value: "false"
      - key: DEFAULT_TENANT_ID
        value: demo-tenant
      - key: SUPPLIER_DEMO_API_KEY
        generateValue: true
      - key: SUPPLIER_APP_ADMIN_USER
        value: staging-admin
      - key: SUPPLIER_APP_ADMIN_PASSWORD
        generateValue: true
      - key: SUPPLIER_APP_SESSION_TIMEOUT_MINUTES
        value: "60"
      - key: RATE_LIMIT_ENABLED
        value: "true"
      - key: RATE_LIMIT_REQUESTS
        value: "300"
      - key: RATE_LIMIT_WINDOW_SECONDS
        value: "60"
      - key: RETENTION_ENABLED
        value: "false"
      - key: SECRETS_PROVIDER
        value: env
      - key: KMS_PROVIDER
        value: local
      - key: CORS_ALLOW_ORIGINS
        value: "*"
      - key: WORKER_MODE
        value: local
      - key: SUPPLIER_SCHEDULER_ENABLED
        value: "false"
