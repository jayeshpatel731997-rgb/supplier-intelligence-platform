# Full Render Blueprint: API and UI are separate web services, with worker services added.
# To use it, copy this file to render.yaml, commit to main, and apply the Blueprint update.
services:
  - type: keyvalue
    name: supplier-intelligence-redis
    plan: free
    region: oregon
    maxmemoryPolicy: allkeys-lru
    ipAllowList: []

  - type: web
    name: supplier-intelligence-api
    runtime: docker
    plan: starter
    region: oregon
    autoDeploy: true
    dockerfilePath: ./backend/Dockerfile
    dockerContext: .
    dockerCommand: sh scripts/start_api_render.sh
    healthCheckPath: /live
    envVars:
      - fromGroup: supplier-intelligence-staging
      - key: SUPPLIER_DATABASE_URL
        fromDatabase:
          name: supplier-intelligence-postgres
          property: connectionString
      - key: DATABASE_URL
        fromDatabase:
          name: supplier-intelligence-postgres
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: supplier-intelligence-redis
          property: connectionString

  - type: web
    name: supplier-intelligence-ui
    runtime: docker
    plan: starter
    region: oregon
    autoDeploy: true
    dockerfilePath: ./Dockerfile
    dockerContext: .
    dockerCommand: sh scripts/start_ui_render.sh
    healthCheckPath: /_stcore/health
    envVars:
      - fromGroup: supplier-intelligence-staging
      - key: SUPPLIER_DATABASE_URL
        fromDatabase:
          name: supplier-intelligence-postgres
          property: connectionString
      - key: DATABASE_URL
        fromDatabase:
          name: supplier-intelligence-postgres
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: supplier-intelligence-redis
          property: connectionString

  - type: worker
    name: supplier-intelligence-celery-worker
    runtime: docker
    plan: starter
    region: oregon
    autoDeploy: true
    dockerfilePath: ./backend/Dockerfile
    dockerContext: .
    dockerCommand: /bin/sh -c "python scripts/migrate.py && celery -A backend.worker.celery_app worker --loglevel=INFO"
    envVars:
      - fromGroup: supplier-intelligence-staging
      - key: WORKER_MODE
        value: celery
      - key: SUPPLIER_SCHEDULER_ENABLED
        value: "false"
      - key: SUPPLIER_DATABASE_URL
        fromDatabase:
          name: supplier-intelligence-postgres
          property: connectionString
      - key: DATABASE_URL
        fromDatabase:
          name: supplier-intelligence-postgres
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: supplier-intelligence-redis
          property: connectionString

  - type: cron
    name: supplier-intelligence-sentinel-cron
    runtime: docker
    plan: starter
    region: oregon
    schedule: "0 * * * *"
    dockerfilePath: ./backend/Dockerfile
    dockerContext: .
    dockerCommand: /bin/sh -c "celery -A backend.worker.celery_app call sentinel_scan_all_tenants_task"
    envVars:
      - fromGroup: supplier-intelligence-staging
      - key: WORKER_MODE
        value: celery
      - key: SUPPLIER_DATABASE_URL
        fromDatabase:
          name: supplier-intelligence-postgres
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: supplier-intelligence-redis
          property: connectionString

  - type: cron
    name: supplier-intelligence-risk-cron
    runtime: docker
    plan: starter
    region: oregon
    schedule: "30 */2 * * *"
    dockerfilePath: ./backend/Dockerfile
    dockerContext: .
    dockerCommand: /bin/sh -c "celery -A backend.worker.celery_app call risk_recalculation_all_tenants_task && celery -A backend.worker.celery_app call exposure_recalculation_all_tenants_task"
    envVars:
      - fromGroup: supplier-intelligence-staging
      - key: WORKER_MODE
        value: celery
      - key: SUPPLIER_DATABASE_URL
        fromDatabase:
          name: supplier-intelligence-postgres
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: supplier-intelligence-redis
          property: connectionString

databases:
  - name: supplier-intelligence-postgres
    databaseName: supplier_intelligence
    user: supplier_app
    plan: basic-256mb
    region: oregon
    postgresMajorVersion: "16"
    ipAllowList: []

envVarGroups:
  - name: supplier-intelligence-staging
    envVars:
      - key: SUPPLIER_SECURITY_MODE
        value: production
      - key: SUPPLIER_DEPLOYMENT_MODE
        value: render-staging-full
      - key: SUPPLIER_DEMO_MODE
        value: "false"
      - key: AUTH_PROVIDER
        value: oidc
      - key: AUTH_ALLOW_LOCAL_IN_PRODUCTION
        value: "false"
      - key: CORS_ALLOW_ORIGINS
        value: ""
      - key: SUPPLIER_APP_ADMIN_USER
        value: staging-admin
      - key: SUPPLIER_APP_ADMIN_PASSWORD
        generateValue: true
      - key: SUPPLIER_APP_SESSION_TIMEOUT_MINUTES
        value: "60"
      - key: RATE_LIMIT_ENABLED
        value: "true"
      - key: RATE_LIMIT_REQUESTS
        value: "300"
      - key: RATE_LIMIT_WINDOW_SECONDS
        value: "60"
      - key: SUPPLIER_MAX_UPLOAD_BYTES
        value: "5000000"
      - key: SUPPLIER_ALLOWED_UPLOAD_EXTENSIONS
        value: ".csv,.xlsx,.xls,.json"
      - key: SUPPLIER_ALLOWED_UPLOAD_MIME_TYPES
        value: text/csv,application/csv,text/plain,application/json,application/vnd.ms-excel,application/vnd.openxmlformats-officedocument.spreadsheetml.sheet
      - key: SUPPLIER_UPLOAD_STORAGE_PROVIDER
        value: s3
      - key: SUPPLIER_UPLOAD_STORAGE_KEY_PREFIX
        value: uploads
      - key: SUPPLIER_UPLOAD_SCANNER_REQUIRED
        value: "false"
      - key: SUPPLIER_UPLOAD_SCANNER_PROVIDER
        value: none
      - key: RETENTION_ENABLED
        value: "false"
      - key: SECRETS_PROVIDER
        value: env
      - key: KMS_PROVIDER
        value: local
      - key: WORKER_MODE
        value: local
      - key: SUPPLIER_SCHEDULER_ENABLED
        value: "false"
